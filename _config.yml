# Integrated Fitness Coaching
# Keep this file small and descriptive so future edits stay easy to reason about.

title: "Integrated Fitness Coaching"
title_separator: " | "
description: "Integrated coaching for physical capability, nutrition, emotional steadiness, and intellectual self-direction."
url: "https://www.integratedfitnesscoaching.com"
baseurl: ""
repository: "zey-enterprises/web-ifc"
timezone: "America/Denver"
locale: "en-US"
date_format: "%Y-%m-%d"
permalink: /:categories/:title/

logo: "/assets/images/ifc-logo.png"
masthead_title: "Integrated Fitness Coaching"
minimal_mistakes_skin: "air"
search: true

remote_theme: "mmistakes/minimal-mistakes@4.27.1"

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme

facebook:
  app_id: 983167900906148
google_analytics: G-CX08MNNEXZ

include:
  - _pages

collections:
  resources:
    output: true
    permalink: /resources/:path/
  testimonials:
    output: true
    permalink: /results/testimonials/:slug/
  case_studies:
    output: true
    permalink: /results/case-studies/:slug/
  faqs:
    output: true
    permalink: /faq/library/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      classes: wide
      show_author: false
      show_date: false
      show_modified_date: false
      show_read_time: false
      toc: false
      toc_widget:
        enabled: false
  - scope:
      path: "_resources/articles"
      type: resources
    values:
      layout: single
      classes: wide
      show_author: true
      show_date: true
      show_modified_date: true
      show_read_time: true
      share: true
      toc_widget:
        enabled: true
        min_level: 2
        max_level: 4
  - scope:
      path: "_resources/visual-media"
      type: resources
    values:
      layout: single
      classes: wide
      show_author: false
      show_date: true
      show_modified_date: false
      show_read_time: false
      share: true
      toc_widget:
        enabled: false
  - scope:
      path: "_resources/faq"
      type: resources
    values:
      layout: redirect
      classes: wide
      show_author: false
      show_date: false
      show_modified_date: false
      show_read_time: false
      share: false
      sitemap: false
      toc_widget:
        enabled: false
  - scope:
      path: ""
      type: testimonials
    values:
      layout: single
      classes: wide
      share: false
  - scope:
      path: ""
      type: case_studies
    values:
      layout: single
      classes: wide
      share: false
  - scope:
      path: ""
      type: faqs
    values:
      layout: single
      classes: wide
      share: false

author:
  name: "Arthur Zey"
  avatar: "/assets/images/arthurzey-avatar.jpg"
  bio: "Integrated fitness coach focused on sustainable body composition, capability, recovery, and practical self-direction."
  links:
    - label: "Apply"
      icon: "fas fa-arrow-right"
      url: "/apply/"
    - label: "Resources"
      icon: "fas fa-book-open"
      url: "/resources/"

footer:
  links:
    - label: "Apply"
      icon: "fas fa-arrow-right"
      url: "/apply/"
      newtab: false
    - label: "Terms of Service"
      icon: "fas fa-scale-balanced"
      url: "/terms/"
      newtab: false
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://www.instagram.com/IntegratedFitnessCoaching"
      newtab: true
    - label: "Facebook"
      icon: "fab fa-facebook"
      url: "https://www.facebook.com/IntegratedFitnessCoaching"
      newtab: true
    - label: "Twitter"
      icon: "fab fa-twitter"
      url: "https://x.com/IntFitCoaching"
      newtab: true
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/company/integrated-fitness-coaching/"
      newtab: true
    - label: "YouTube"
      icon: "fab fa-youtube"
      url: "https://www.youtube.com/@IntegratedFitnessCoaching"
      newtab: true

social_share:
  # label: "Share:"
  providers:
    - x
    - facebook
    - linkedin
    - os-share
    - link
  message: "Check this out from {account}!"

atom_feed:
  hide: true

sass:
  style: compressed

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    block:
      line_numbers: false
