<section class="ifc-footer-band">
  <div class="ifc-footer-brand">
    <img src="/assets/images/ifc-logo.png" alt="Integrated Fitness Coaching logo">
    <div>
      <strong>Integrated Fitness Coaching</strong>
      <p>Training, nutrition, self-regulation, and intellectual clarity in service of a fuller life.</p>
    </div>
  </div>
</section>
<script>
  window.IFC_ANNOTATIONS = window.IFC_ANNOTATIONS || {};
  window.IFC_ANNOTATIONS.glossary = {{ site.data.glossary | jsonify }};
  window.IFC_ANNOTATIONS.citation = {{ site.data.citation | jsonify }};
  window.IFC_ANNOTATIONS.pageCitations = {{ page.citations | default: empty | jsonify }};
</script>
<script src="{{ '/assets/js/annotations.js' | relative_url }}"></script>
<script src="{{ '/assets/js/heading-permalinks.js' | relative_url }}"></script>
<script src="{{ '/assets/js/toc-widget.js' | relative_url }}"></script>
{% assign reading_time_collections = "posts|guides" | split: "|" %}
{% if page.read_time and reading_time_collections contains page.collection %}
  <script src="{{ '/assets/js/reading-time.js' | relative_url }}"></script>
{% endif %}
